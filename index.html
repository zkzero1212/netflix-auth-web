<script>
    // ★여기에 방금 복사한 GAS 웹 앱 URL을 붙여넣으세요!★
    const API_URL = "https://script.google.com/macros/s/AKfycbwQzRogat5B8OYLQdNn3e0t1U1gRzGowNIHSJ1KBTtq19oYwsZSCqDTTFjIj6LCAITp/exec";
    
    // 글로벌 변수로 DB에서 받아온 안내문구 저장
    let dbTexts = { notice: "", helpTv: "", helpMobile: "", helpLogin: "" };

    window.onload = () => {
      const savedKey = localStorage.getItem('netflix_auth_key');
      if (savedKey) {
        verifyKeyBackend(savedKey);
      }
    };

    // 1. 키 검증 및 데이터 로드 API 호출
    async function verifyKeyBackend(key) {
      showModal("로딩 중", "인증 정보를 확인하는 중입니다...");
      try {
        const response = await fetch(`${API_URL}?action=verify&key=${encodeURIComponent(key)}`);
        const result = await response.json();
        closeModal();

        if (result.success) {
          // 키가 유효하면 로컬스토리지에 저장하고 메인화면 띄우기
          localStorage.setItem('netflix_auth_key', key);
          
          document.getElementById('gate-screen').classList.add('hidden');
          document.getElementById('main-screen').classList.remove('hidden');
          
          // 데이터 화면에 뿌리기
          document.getElementById('netflix-pw').innerText = result.data.pw;
          document.getElementById('exp-date').innerText = result.data.expDate;
          
          // D-Day 계산
          const exp = new Date(result.data.expDate + "T23:59:59");
          const diff = Math.floor((exp - new Date()) / 86400000);
          document.getElementById('exp-dday').innerText = diff < 0 ? "만료됨" : "D - " + diff;
          document.getElementById('exp-dday').style.color = diff < 0 ? "#ff6b6b" : "#e50914";

          // 안내 텍스트 저장
          dbTexts.notice = result.data.notice;
          dbTexts.helpTv = result.data.helpTv;
          dbTexts.helpMobile = result.data.helpMobile;
          dbTexts.helpLogin = result.data.helpLogin;

        } else {
          // 키가 틀리거나 만료된 경우
          logout();
          showAlert("접근 거부", result.message);
        }
      } catch (err) {
        closeModal();
        showAlert("네트워크 오류", "서버와 통신할 수 없습니다.");
      }
    }

    // 게이트 화면의 '입장하기' 버튼
    function verifyKey() {
      const keyInput = document.getElementById('auth-key-input').value.trim();
      if (!keyInput) {
        showAlert("알림", "인증키를 입력해주세요.");
        return;
      }
      verifyKeyBackend(keyInput);
    }

    // 메일 파싱 (인증 확인) API 호출
    async function checkAuth() {
      const savedKey = localStorage.getItem('netflix_auth_key');
      if (!savedKey) return logout();

      showModal("처리 중", "넷플릭스 이메일함을 확인하고 있습니다...\n(약 2~5초 소요)");
      
      try {
        const response = await fetch(`${API_URL}?action=auth&key=${encodeURIComponent(savedKey)}`);
        const result = await response.json();
        closeModal();

        if (result.success) {
          if (result.type === 'url') {
            window.location.href = result.url; // 링크 이동
          } else if (result.type === 'code') {
            const codeHtml = `<div style="font-size:2.5rem; color:#e50914; font-weight:bold; letter-spacing:5px; text-align:center;">${result.code}</div>`;
            showAlert("🔑 로그인 코드", codeHtml);
          }
        } else {
          // 오류 발생 시 (메일 없음, 또는 인증키 만료)
          if(result.message.includes("만료")) logout(); // 키 만료 시 강제 로그아웃
          showAlert("인증 실패", result.message);
        }
      } catch (err) {
        closeModal();
        showAlert("네트워크 오류", "메일을 확인하는 중 문제가 발생했습니다.");
      }
    }

    // 안내 모달 띄우기
    function showNotice() {
      showAlert("💬 문의사항", dbTexts.notice || "현재 시스템에 등록된 문의사항이 없습니다.");
    }

    function showGuide() {
      const guideHtml = `
        <div style="margin-bottom: 15px;">
          <b style="color:#e50914;">📺 TV 인증 방법</b><br>
          <span style="font-size: 0.85rem;">${dbTexts.helpTv.replace(/\n/g, '<br>')}</span>
        </div>
        <div style="margin-bottom: 15px;">
          <b style="color:#e50914;">📱 모바일 인증 방법</b><br>
          <span style="font-size: 0.85rem;">${dbTexts.helpMobile.replace(/\n/g, '<br>')}</span>
        </div>
        <div>
          <b style="color:#e50914;">🔑 로그인 코드 도움말</b><br>
          <span style="font-size: 0.85rem;">${dbTexts.helpLogin.replace(/\n/g, '<br>')}</span>
        </div>
      `;
      showAlert("🔰 이용 가이드", guideHtml);
    }

    // 로그아웃 (스토리지 비우기)
    function logout() {
      localStorage.removeItem('netflix_auth_key');
      document.getElementById('auth-key-input').value = "";
      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('gate-screen').classList.remove('hidden');
    }

    // 클립보드 복사
    function copyToClipboard(text, label) {
      if(text === '비밀번호로딩중') text = document.getElementById('netflix-pw').innerText;
      const tempInput = document.createElement("input");
      document.body.appendChild(tempInput);
      tempInput.value = text;
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);
      showAlert("복사 완료", `[${label}] 항목이 복사되었습니다.`);
    }

    function showAlert(title, body) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = body;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
  </script>
